[defaults]
inventory              = inventory/
roles_path             = roles/
collections_path       = ~/.ansible/collections
host_key_checking      = False
stdout_callback        = ansible.builtin.default
result_format          = yaml
retry_files_enabled    = False
any_errors_fatal       = true

[ssh_connection]
pipelining          = True
ssh_args            = -o ControlMaster=auto -o ControlPersist=60s
