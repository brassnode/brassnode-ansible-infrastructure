---
- name: Update apt cache (Debian/Ubuntu)
  ansible.builtin.apt:
    update_cache: yes
  register: apt_update
  retries: 6
  delay: 10
  until: apt_update is succeeded
  when: ansible_os_family == "Debian"

- name: Install WireGuard (Debian/Ubuntu)
  ansible.builtin.apt:
    name: "{{ wireguard_packages }}"
    state: present
  register: apt_install
  retries: 6
  delay: 10
  until: apt_install is succeeded
  when: ansible_os_family == "Debian"

- name: Ensure wireguard config directory exists
  ansible.builtin.file:
    path: /etc/wireguard
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Enable IPv4 forwarding
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_set: true
    state: present
    reload: true
  when: wireguard_enable_ip_forward | bool

- name: Enable IPv6 forwarding
  ansible.posix.sysctl:
    name: net.ipv6.conf.all.forwarding
    value: "1"
    sysctl_set: true
    state: present
    reload: true
  when:
    - wireguard_enable_ip_forward | bool
    - wireguard_enable_ipv6 | bool
