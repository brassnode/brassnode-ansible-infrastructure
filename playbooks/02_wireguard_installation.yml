---
- name: Install and configure WireGuard VPN
  hosts: vpn
  become: true
  gather_facts: true

  vars:
    wireguard_interface: "wg0"
    wireguard_address: "10.0.0.1/24"
    wireguard_port: 51820
    wireguard_nat_interface: "eth0"
    wireguard_server_public_ip: "{{ server_public_ip }}"
    wireguard_dns:
      - "1.1.1.1"
      - "1.0.0.1"

    wireguard_peers:
      - name: elizabeth
        public_key: "J+OIlWeCKJQhMnTJgqZsz4VQLiz3RUuCROYOcB+T1h4="
        allowed_ips:
          - "10.0.0.2/32"
        persistent_keepalive: 25

    wireguard_use_preshared_keys: true
    wireguard_generate_client_configs: true

    # Route ALL client traffic through VPN (full tunnel)
    wireguard_client_allowed_ips:
      - "0.0.0.0/0"
      - "::/0"

  roles:
    - role: wireguard_installation

  post_tasks:
    - name: Show WireGuard status
      ansible.builtin.command: wg show
      register: wg_status
      changed_when: false

    - name: Print WireGuard status
      ansible.builtin.debug:
        var: wg_status.stdout_lines
